services:
  - type: web
    name: ai-team-analyzer-api
    runtime: python
    repo: https://github.com/jatinverma023/ai-team-analyzer
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: ALLOWED_ORIGINS
        sync: false  # Set to your Vercel frontend URL
      - key: PYTHON_VERSION
        value: "3.11.0"
